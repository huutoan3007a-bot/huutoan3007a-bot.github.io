<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>To-Do List App</title>
    <link href="./CSS/style.css" rel="stylesheet">
</head>

<body>
    <div class="app">
        <h2>My To-Do List</h2>

        <div class="input-group">
            <input type="text" id="taskInput" placeholder="Thêm công việc mới...">
            <button class="add-btn" id="addBtn">Thêm</button>
        </div>

        <div class="filters">
            <button data-filter="all" class="active">Tất cả</button>
            <button data-filter="active">Đang làm</button>
            <button data-filter="done">Đã xong</button>
        </div>

        <ul id="taskList"></ul>

        <div class="counter" id="counter"></div>
    </div>

    <script src="./js/script.js"></script>
</body>
